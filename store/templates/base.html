{% load static %}
<!DOCTYPE html>
<html>
<head>
    <link rel="stylesheet" href="{% static 'css/novacart.css' %}">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
    <title>Ecommerce</title>
</head>
<body>

<nav class="navbar">
    <div class="nav-logo">
        <i class="fa-solid fa-bag-shopping"></i>
        Nova<span>Cart</span>
    </div>

    <form method="GET" action="{% url 'products' %}" class="nav-search">
        <i class="fa fa-search"></i>
        <input type="text" name="q" placeholder="Search products...">
    </form>

    <div class="nav-actions">
            <a href="{% url 'cart' %}" class="nav-btn">
                <i class="fa fa-shopping-cart"></i>
                <span>Cart</span>
            </a>

            <a href="{% url 'wishlist' %}" class="nav-btn">
                <i class="fa fa-heart"></i>
                <span>Wishlist</span>
            </a>

        <div class="nav-user">
            <div class="nav-user-btn">
                <div class="nav-user-avatar">
                    {{ request.user.username|first|upper }}
                </div>
                <span>{{ request.user.username }}</span>
            </div>

            <div class="dropdown-menu">
                <a href="{% url 'orders' %}">
                    <i class="fa fa-box"></i> Orders
                </a>
                <div class="dropdown-divider"></div>
                <a href="{% url 'logout' %}">
                    <i class="fa fa-sign-out-alt"></i> Logout
                </a>
            </div>
        </div>
    </div>
</nav>

<hr>

{% block content %}{% endblock %}

<hr>
<footer>
    <div class="container footer-top">
        <div class="footer-brand">
            <div class="logo">Nova<span>Cart</span></div>
            <p>Your modern ecommerce solution.</p>
        </div>
    </div>

    <div class="container footer-bottom">
        <p>© 2026 NovaCart. All rights reserved.</p>
    </div>
</footer>

</body>
</html>
