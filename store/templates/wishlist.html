{% extends 'base.html' %}
{% block content %}

<div class="page-banner">
    <div class="container">
        <h1>Your Wishlist</h1>
    </div>
</div>

<div class="container page-content">

    {% if items %}
    <div class="products-grid">

        {% for item in items %}
        <div class="product-card">

            <div class="product-img-wrap">
                <img src="{{ item.product.image.url }}">
            </div>

            <div class="product-body">

                <div class="product-name">
                    {{ item.product.name }}
                </div>

                <div class="product-price">
                    <div class="price-current">
                        ₹{{ item.product.price }}
                    </div>
                </div>

                <div class="d-flex gap-2">

                    <a href="{% url 'product_detail' item.product.id %}" 
                       class="btn btn-primary btn-sm">
                        View
                    </a>

                    <a href="{% url 'toggle_wishlist' item.product.id %}" 
                       class="btn btn-danger btn-sm">
                        Remove
                    </a>

                </div>

            </div>

        </div>
        {% endfor %}

    </div>
    {% else %}

    <div class="wishlist-empty text-center">
        <i class="fa fa-heart" style="font-size:60px; color:#e2e8f0;"></i>
        <h3 class="mt-2">Your wishlist is empty</h3>
        <a href="{% url 'products' %}" class="btn btn-primary mt-2">
            Explore Products
        </a>
    </div>

    {% endif %}

</div>

{% endblock %}
